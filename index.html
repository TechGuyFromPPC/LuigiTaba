<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luigi’s Final Cut | Artisanal Chef Knives</title>
    <style>
        /* CSS SECTION */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #e0e0e0; min-height: 100vh; }

        .main-banner { 
            background-color: #000; padding: 1rem 5%; border-bottom: 2px solid #333; 
            position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center;
        }
        .logo-link { display: flex; align-items: center; text-decoration: none; }
        #main-logo { height: 50px; margin-right: 15px; }
        #logo-text { font-family: 'Georgia', serif; font-size: 1.2rem; text-transform: uppercase; color: white; }
        
        .nav-links a { color: #888; text-decoration: none; margin-left: 20px; cursor: pointer; font-weight: bold; }
        .nav-links a:hover { color: #fff; }

        .hero-intro { text-align: center; padding: 4rem 10%; background: #1a1a1a; }
        .brand-selection, #knife-display, #product-page, #inventory-page { padding: 3rem 5%; text-align: center; }
        
        #brand-grid, #knife-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 2rem; }

        .brand-card {
            background-color: #1e1e1e; padding: 5rem 2rem; border: 1px solid #333;
            cursor: pointer; transition: 0.3s; background-size: cover; background-position: center;
        }
        .brand-shun { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('knife1.jpg'); }
        .brand-miyabi { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('knife2.jpg'); }
        .brand-wusthof { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('knife3.jpg'); }
        .brand-card:hover { border-color: #fff; transform: translateY(-5px); }

        .product-container { display: flex; gap: 50px; text-align: left; margin-top: 30px; flex-wrap: wrap; }
        .product-image-box { flex: 1; min-width: 320px; height: 500px; overflow: hidden; border: 1px solid #333; }
        #main-product-img { width: 100%; height: 100%; object-fit: cover; }
        .product-details { flex: 1; min-width: 300px; }
        .p-price { font-size: 2.2rem; color: #ff4d4d; margin: 15px 0; font-weight: bold; }
        .specs-box { background: #1e1e1e; padding: 20px; border-left: 4px solid white; margin: 25px 0; }
        
        .buy-btn-large { background: white; color: black; border: none; padding: 18px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.9);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content { background-color: #222; padding: 40px; border: 1px solid #444; border-radius: 8px; text-align: center; }
        
        .btn-back { background: none; border: 1px solid #555; color: #888; padding: 10px 20px; cursor: pointer; margin-bottom: 20px; }
        .hidden { display: none !important; }

        @media (max-width: 768px) { .product-container { flex-direction: column; } .product-image-box { height: 350px; } }
    </style>
</head>
<body>

    <header class="main-banner">
        <a href="#" class="logo-link" onclick="showHome()">
            <img src="logo.jpg" alt="Logo" id="main-logo">
            <div id="logo-text">Luigi's Final Cut</div>
        </a>
        <nav class="nav-links">
            <a onclick="showInventory()">Inventory (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <main>
        <div id="home-view">
            <section class="hero-intro">
                <h1>Curated for performance.</h1>
                <p>Personalized collection for the elite.</p>
            </section>
            <section class="brand-selection">
                <div id="brand-grid">
                    <div class="brand-card brand-shun" onclick="loadKnivesByBrand('Shun')"><h3>Shun</h3></div>
                    <div class="brand-card brand-miyabi" onclick="loadKnivesByBrand('Miyabi')"><h3>Miyabi</h3></div>
                    <div class="brand-card brand-wusthof" onclick="loadKnivesByBrand('Wusthof')"><h3>Wüsthof</h3></div>
                </div>
            </section>
        </div>

        <section id="knife-display" class="hidden">
            <button class="btn-back" onclick="showHome()">← Back</button>
            <h2 id="current-brand-header"></h2>
            <div id="knife-grid"></div>
        </section>

        <section id="product-page" class="hidden">
            <button class="btn-back" onclick="backToCollection()">← Back</button>
            <div class="product-container">
                <div class="product-image-box"><img src="" id="main-product-img"></div>
                <div class="product-details">
                    <h1 id="p-name"></h1>
                    <p class="p-price"></p>
                    <p id="p-desc"></p>
                    <div class="specs-box"><p id="p-specs"></p></div>
                    <button class="buy-btn-large" onclick="openConfirmModal()">Add to Inventory</button>
                </div>
            </div>
        </section>

        <section id="inventory-page" class="hidden">
            <button class="btn-back" onclick="showHome()">← Back to Store</button>
            <h1>Your Inventory</h1>
            <div id="inventory-list" style="max-width: 500px; margin: 30px auto;"></div>
            <h2>Total: <span id="inventory-total">Php 0</span></h2>
        </section>
    </main>

    <div id="cart-confirm-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="confirm-msg" style="margin-bottom:20px;">Add to Inventory?</h3>
            <button onclick="confirmAdd()" style="background:#27ae60; color:white; padding:10px 20px; border:none; cursor:pointer; font-weight:bold; margin-right:10px;">YES</button>
            <button onclick="closeConfirmModal()" style="background:#c0392b; color:white; padding:10px 20px; border:none; cursor:pointer; font-weight:bold;">NO</button>
        </div>
    </div>

    <script>
        const knifeData = {
            'Kyle': { fullName: "Kyle Jasmin Parcon (sana)", height: "5'0\"", age: "25", attitude: "Mainitin ang ulo, suplada pero mabait", status: "Taken na ata", motto: "Di bale na gutom basta may pera.", price: "Php 50", img: "kyle1.jpg" },
            'Mhira': { fullName: "Mhira Dalonoooos", height: "Matangkad", age: "30", attitude: "Masungit talaga to", status: "Taken", motto: "Iinom pero di malalasing", price: "Php 500", img: "mhira1.jpg" },
            'Eve': { fullName: "Eve Mahipos", height: "5'0\"", age: "35", attitude: "Emotional", status: "Taken", motto: "Boss wag po!", price: "Php 500", img: "eve1.jpg" },
            'Te': { fullName: "The Te", height: "5'x", age: "xx", attitude: "Sample", status: "Unknown", motto: "Motto", price: "Php 100", img: "knife2.jpg" },
            'Yu': { fullName: "The Yu", height: "5'x", age: "xx", attitude: "Sample", status: "Unknown", motto: "Motto", price: "Php 100", img: "knife2.jpg" },
            'Ki': { fullName: "The Ki", height: "5'x", age: "xx", attitude: "Sample", status: "Unknown", motto: "Motto", price: "Php 100", img: "knife2.jpg" },
            'Ti': { fullName: "The Ti", height: "5'x", age: "xx", attitude: "Sample", status: "Unknown", motto: "Motto", price: "Php 75", img: "knife3.jpg" },
            'Co': { fullName: "The Co", height: "5'x", age: "xx", attitude: "Sample", status: "Unknown", motto: "Motto", price: "Php 75", img: "knife3.jpg" },
            'Wi': { fullName: "The Wi", height: "5'x", age: "xx", attitude: "Sample", status: "Unknown", motto: "Motto", price: "Php 75", img: "knife3.jpg" }
        };

        let userInventory = [];
        let currentItem = "";

        function loadKnivesByBrand(brand) {
            hideAll();
            document.getElementById('knife-display').classList.remove('hidden');
            document.getElementById('current-brand-header').innerText = brand.toUpperCase() + " COLLECTION";
            const grid = document.getElementById('knife-grid');
            if (brand === 'Shun') {
                grid.innerHTML = `<div class="brand-card" onclick="viewProduct('Kyle')"><h3>The Kyle</h3></div><div class="brand-card" onclick="viewProduct('Mhira')"><h3>The Mhira</h3></div><div class="brand-card" onclick="viewProduct('Eve')"><h3>The Eve</h3></div>`;
            } else if (brand === 'Miyabi') {
                grid.innerHTML = `<div class="brand-card" onclick="viewProduct('Te')"><h3>The Te</h3></div><div class="brand-card" onclick="viewProduct('Yu')"><h3>The Yu</h3></div><div class="brand-card" onclick="viewProduct('Ki')"><h3>The Ki</h3></div>`;
            } else {
                grid.innerHTML = `<div class="brand-card" onclick="viewProduct('Ti')"><h3>The Ti</h3></div><div class="brand-card" onclick="viewProduct('Co')"><h3>The Co</h3></div><div class="brand-card" onclick="viewProduct('Wi')"><h3>The Wi</h3></div>`;
            }
        }

        function viewProduct(name) {
            currentItem = name;
            const data = knifeData[name];
            hideAll();
            document.getElementById('product-page').classList.remove('hidden');
            document.getElementById('p-name').innerText = "The " + name;
            document.querySelector('.p-price').innerText = data.price;
            document.getElementById('p-desc').innerHTML = `<strong>Full Name:</strong> ${data.fullName}<br><strong>Height:</strong> ${data.height}<br><strong>Age:</strong> ${data.age}`;
            document.getElementById('p-specs').innerHTML = `<strong>Attitude:</strong> ${data.attitude}<br><br><strong>Motto:</strong> "${data.motto}"`;
            document.getElementById('main-product-img').src = data.img;
        }

        function openConfirmModal() {
            document.getElementById('confirm-msg').innerText = `Add ${currentItem} to inventory?`;
            document.getElementById('cart-confirm-modal').classList.remove('hidden');
        }

        function confirmAdd() {
            userInventory.push({ name: currentItem, price: knifeData[currentItem].price });
            document.getElementById('cart-count').innerText = userInventory.length;
            closeConfirmModal();
            showInventory();
        }

        function showInventory() {
            hideAll();
            document.getElementById('inventory-page').classList.remove('hidden');
            const list = document.getElementById('inventory-list');
            let total = 0;
            list.innerHTML = "";
            userInventory.forEach(item => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;"><span>${item.name}</span><span>${item.price}</span></div>`;
                // Robust price parsing
                let num = parseInt(item.price.replace(/[^\d]/g, ''));
                if(!isNaN(num)) total += num;
            });
            document.getElementById('inventory-total').innerText = "Php " + total;
        }

        function hideAll() { 
            ['home-view', 'knife-display', 'product-page', 'inventory-page'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden');
            });
        }
        function showHome() { hideAll(); document.getElementById('home-view').classList.remove('hidden'); }
        function backToCollection() { hideAll(); document.getElementById('knife-display').classList.remove('hidden'); }
        function closeConfirmModal() { document.getElementById('cart-confirm-modal').classList.add('hidden'); }
    </script>
</body>
</html>
